name: Build iPSX2 M4 Optimized
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Clean Environment
        run: |
          rm -rf build/
          rm -rf Frameworks/
          
      - name: Setup MoltenVK 1.4.1 (iOS ONLY)
        run: |
          curl -L https://github.com/KhronosGroup/MoltenVK/releases/download/v1.4.1/MoltenVK-ios.tar -o MoltenVK.tar
          tar -xf MoltenVK.tar
          mkdir -p Frameworks
          # سحب نسخة الآيفون حصراً وحذف البقية
          cp -Ra MoltenVK/MoltenVK/static/MoltenVK.xcframework/ios-arm64/MoltenVK.framework Frameworks/
          rm -rf MoltenVK/
          rm -rf MoltenVK.tar

      - name: CMake Configuration
        run: |
          cmake -B build -G Xcode             -DCMAKE_SYSTEM_NAME=iOS             -DCMAKE_OSX_ARCHITECTURES=arm64             -DCMAKE_OSX_SYSROOT=iphoneos             -DCMAKE_FRAMEWORK_PATH=$(pwd)/Frameworks             -DMoltenVK_FRAMEWORK_PATH=$(pwd)/Frameworks/MoltenVK.framework
          cmake --build build --config Release --target iPSX2
