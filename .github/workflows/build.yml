name: Build iPSX2 M4 Final Strike
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup MoltenVK iOS Specialized
        run: |
          curl -L https://github.com/KhronosGroup/MoltenVK/releases/download/v1.4.1/MoltenVK-ios.tar -o MoltenVK.tar
          tar -xf MoltenVK.tar

          mkdir -p MY_SAFE_LIBS
          cp -Ra MoltenVK/MoltenVK/static/MoltenVK.xcframework/ios-arm64/MoltenVK.framework MY_SAFE_LIBS/

          rm -rf MoltenVK/
          rm -rf MoltenVK.tar

          mkdir -p Frameworks
          cp -Ra MY_SAFE_LIBS/MoltenVK.framework Frameworks/

          echo "Verified unique path:"
          ls -R MY_SAFE_LIBS/
          echo "Verified hardcoded Frameworks path:"
          ls -R Frameworks/

      - name: CMake Configuration
        run: |
          rm -rf build/
          cmake -B build -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_XCODE_ATTRIBUTE_ONLY_ACTIVE_ARCH=YES \
            -DMoltenVK_FRAMEWORK_PATH=${{ github.workspace }}/Frameworks/MoltenVK.framework \
            -DMoltenVK_LIBRARY_PATH=${{ github.workspace }}/Frameworks/MoltenVK.framework

          cmake --build build --config Release --target iPSX2
