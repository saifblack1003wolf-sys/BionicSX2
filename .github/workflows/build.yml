name: Build iPSX2 M4 Final Strike
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup MoltenVK iOS Specialized
        run: |
          curl -L https://github.com/KhronosGroup/MoltenVK/releases/download/v1.4.1/MoltenVK-ios.tar -o MoltenVK.tar
          tar -xf MoltenVK.tar
          
          # إنشاء مجلد باسم فريد بعيداً عن كلمة Frameworks الاعتيادية
          mkdir -p MY_IOS_LIBS
          
          # نسخ الملف وتغيير اسمه داخلياً للتمويه
          cp -Ra MoltenVK/MoltenVK/static/MoltenVK.xcframework/ios-arm64/MoltenVK.framework MY_IOS_LIBS/
          
          # حذف المصدر تماماً
          rm -rf MoltenVK/
          rm -rf MoltenVK.tar
          
          echo "Verified unique path:"
          ls -R MY_IOS_LIBS/

      - name: CMake Configuration
        run: |
          rm -rf build/
          cmake -B build -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DMoltenVK_FRAMEWORK_PATH=$(pwd)/MY_IOS_LIBS/MoltenVK.framework \
            -DCMAKE_FRAMEWORK_PATH=$(pwd)/MY_IOS_LIBS \
            -DCMAKE_XCODE_ATTRIBUTE_ONLY_ACTIVE_ARCH=YES
            
          cmake --build build --config Release --target iPSX2
