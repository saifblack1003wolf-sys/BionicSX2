name: Build iPSX2 M4 Final
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup MoltenVK 1.4.1 (STRIP NON-IOS)
        run: |
          curl -L https://github.com/KhronosGroup/MoltenVK/releases/download/v1.4.1/MoltenVK-ios.tar -o MoltenVK.tar
          tar -xf MoltenVK.tar
          mkdir -p Frameworks
          
          # خطوة الحسم: سحب نسخة الآيفون الحقيقية فقط
          cp -Ra MoltenVK/MoltenVK/static/MoltenVK.xcframework/ios-arm64/MoltenVK.framework Frameworks/
          
          # حذف كل المجلدات الأصلية تماماً لضمان عدم حدوث تضارب معماري
          rm -rf MoltenVK/
          rm -rf MoltenVK.tar
          
          echo "Verified: Only iOS Framework exists now."
          ls -R Frameworks/

      - name: CMake Build
        run: |
          # مسح أي كاش قديم
          rm -rf build/
          
          cmake -B build -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_FRAMEWORK_PATH=$(pwd)/Frameworks \
            -DMoltenVK_FRAMEWORK_PATH=$(pwd)/Frameworks/MoltenVK.framework \
            -DCMAKE_XCODE_ATTRIBUTE_ONLY_ACTIVE_ARCH=YES
            
          cmake --build build --config Release --target iPSX2
